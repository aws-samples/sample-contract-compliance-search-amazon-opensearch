Resources:
  # ========================================
  # SAGEMAKER INFRASTRUCTURE RESOURCES
  # ========================================
  
  # SageMaker Execution Role
  SageMakerRole:
    Type: AWS::IAM::Role
    Condition: UseDefaultSageMakerEndpoint
    Properties:
      RoleName: !Join [ "-", [ "SageMakerRole", !Select [ 4, !Split [ '-', !Select [ 2, !Split [ '/', !Ref AWS::StackId ] ] ] ] ] ]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - sagemaker.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: SageMakerScopedAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:CreateModel
                  - sagemaker:CreateEndpointConfig
                  - sagemaker:CreateEndpoint
                  - sagemaker:DescribeEndpoint
                  - sagemaker:InvokeEndpoint
                Resource: !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:*:repository/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/sagemaker/*'
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: 
                  - !Sub "arn:aws:s3:::opensearch-cfn-semantic-highlighting-${AWS::Region}-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::opensearch-cfn-semantic-highlighting-${AWS::Region}-${AWS::AccountId}/*"

  # Helper Lambda Role for model copying
  HelperLambdaInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Join [ "-", [ "HelperLambdaInvokeRole", !Select [ 4, !Split [ '-', !Select [ 2, !Split [ '/', !Ref AWS::StackId ] ] ] ] ] ]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
          - Effect: Allow
            Principal:
              Service:
                - s3.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: "/"
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/HelperLambda-*'
                  - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/HelperLambda-*:*'
              - Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:PassRole
                  - iam:GetRole
                  - iam:CreateRole
                  - iam:GetRolePolicy
                  - iam:CreatePolicy
                  - iam:AttachRolePolicy
                  - iam:PutRolePolicy
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/${LambdaInvokeOpenSearchMLCommonsRoleName}'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/role-${AWS::StackName}'
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                  - s3:DeleteBucket
                Resource:
                  - !Sub "arn:aws:s3:::opensearch-cfn-semantic-highlighting-${AWS::Region}-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::opensearch-cfn-semantic-highlighting-${AWS::Region}-${AWS::AccountId}/*"

  # Helper Lambda Function for model copying
  HelperLambdaFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Delete
    DependsOn: [ HelperLambdaInvokeRole ]
    Properties:
      FunctionName: !Join [ '-', [ "HelperLambda", !Select [ 4, !Split [ '-', !Select [ 2, !Split [ '/', !Ref AWS::StackId ] ] ] ] ] ]
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          import hashlib
          import urllib.request
          import botocore
          import time
          import os
          import tarfile
          import shutil
          import zipfile

          def lambda_handler(event, context):
              print(f"Event: {json.dumps(event)}")

              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              try:
                  # Manage IAM role and PassRole policy if parameters are provided
                  if 'OpenSearchInvokeModelRole' in event['ResourceProperties'] and 'LambdaInvokeAOSRole' in event['ResourceProperties']:
                      iam = boto3.client('iam')
                      os_invoke_model_role_arn = event['ResourceProperties']['OpenSearchInvokeModelRole']
                      lambda_invoke_aos_role_name = event['ResourceProperties']['LambdaInvokeAOSRole']
                      manage_iam_role(iam, lambda_invoke_aos_role_name, os_invoke_model_role_arn)

                  # Check if this is a Lambda zip download request
                  if 'LambdaZipUrl' in event['ResourceProperties']:
                      return download_lambda_zip(event, context)
                  else:
                      return download_model(event, context)

              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

          def manage_iam_role(iam, role_name, os_invoke_model_role_arn):
              """Manage IAM role and PassRole policy"""
              if not iam_role_exists(iam, role_name):
                  print(f"Role {role_name} does not exist, skipping PassRole policy management")
                  return

              if not model_passrole_policy_exists(iam, role_name):
                  # Create new PassRole policy
                  model_passrole_policy = create_passrole_policy(os_invoke_model_role_arn)
                  put_role_policy(iam, role_name, 'ModelPassRole', model_passrole_policy)
                  print(f"Created PassRole policy for {os_invoke_model_role_arn}")
              else:
                  # Append to existing PassRole policy
                  existing_inline_policy = iam.get_role_policy(RoleName=role_name, PolicyName='ModelPassRole')
                  inline_policy = existing_inline_policy['PolicyDocument']

                  # Find the PassRole statement and add role ARN to its Resource list
                  role_exists_in_policy = False
                  for stmt in inline_policy.get('Statement', []):
                      if stmt.get('Action') == ['iam:PassRole'] or stmt.get('Action') == 'iam:PassRole':
                          resources = stmt.get('Resource', [])
                          # Convert single string to list for consistent handling
                          if isinstance(resources, str):
                              resources = [resources]
                              stmt['Resource'] = resources

                          # Check if role ARN already exists
                          if os_invoke_model_role_arn in resources:
                              role_exists_in_policy = True
                              print(f"Role {os_invoke_model_role_arn} already in PassRole policy")
                              break

                          # Add the new role ARN to this statement's Resource list
                          resources.append(os_invoke_model_role_arn)
                          role_exists_in_policy = True
                          put_role_policy(iam, role_name, 'ModelPassRole', inline_policy)
                          print(f"Added {os_invoke_model_role_arn} to existing PassRole policy")
                          break

                  # If no PassRole statement found (shouldn't happen), create new statement
                  if not role_exists_in_policy:
                      new_statement = create_passrole_statement_line(os_invoke_model_role_arn)
                      inline_policy['Statement'].append(new_statement)
                      put_role_policy(iam, role_name, 'ModelPassRole', inline_policy)
                      print(f"Created new PassRole statement for {os_invoke_model_role_arn}")

          def iam_role_exists(iam, role_name):
              try:
                  iam.get_role(RoleName=role_name)
                  return True
              except iam.exceptions.NoSuchEntityException:
                  return False

          def model_passrole_policy_exists(iam, role_name):
              try:
                  iam.get_role_policy(RoleName=role_name, PolicyName='ModelPassRole')
                  return True
              except iam.exceptions.NoSuchEntityException:
                  return False

          def create_passrole_statement_line(os_invoke_model_role_arn):
              return {"Effect": "Allow", "Action": ["iam:PassRole"], "Resource": os_invoke_model_role_arn}

          def create_passrole_policy(os_invoke_model_role_arn):
              return {
                  "Version": "2012-10-17",
                  "Statement": [create_passrole_statement_line(os_invoke_model_role_arn)]
              }

          def put_role_policy(iam, role_name, policy_name, policy_document):
              try:
                  iam.put_role_policy(RoleName=role_name, PolicyName=policy_name, PolicyDocument=json.dumps(policy_document))
                  time.sleep(2)
              except botocore.exceptions.ClientError as e:
                  print(f"Error putting role policy: {e}")
                  raise e
          
          def download_lambda_zip(event, context):
              """Download Lambda zip from CloudFront, patch connector JSON escaping, upload to S3"""
              try:
                  url = event['ResourceProperties']['LambdaZipUrl']
                  s3_bucket = event['ResourceProperties']['S3Bucket']
                  s3_key = event['ResourceProperties']['S3Key']
                  tmp_file_path = f"/tmp/{s3_key.split('/')[-1]}"
                  
                  print(f"Downloading Lambda zip from {url}")
                  urllib.request.urlretrieve(url, tmp_file_path)
                  
                  # Verify integrity of downloaded artifact
                  expected_hash = event['ResourceProperties'].get('ExpectedSha256', '')
                  if expected_hash:
                      with open(tmp_file_path, 'rb') as f:
                          actual_hash = hashlib.sha256(f.read()).hexdigest()
                      if actual_hash != expected_hash:
                          raise ValueError(f"Integrity check failed for Lambda zip. Expected {expected_hash}, got {actual_hash}")
                      print(f"  Integrity verified: SHA-256 = {actual_hash}")

                  # Patch the connector's pre_process_function. The shipped Painless script
                  # concatenates document text directly into a JSON string without escaping,
                  # which produces invalid JSON (MalformedJsonException) whenever a document
                  # contains a double-quote, newline, tab, or backslash - common in real
                  # contracts. Rewrite the single-document branch to JSON-escape question and
                  # context using character codes (Painless string literals reject \n, \t, \").
                  patch_connector_zip(tmp_file_path)

                  # Create S3 bucket if it doesn't exist
                  s3_client = boto3.client('s3')
                  try:
                      s3_client.head_bucket(Bucket=s3_bucket)
                  except botocore.exceptions.ClientError:
                      region = boto3.session.Session().region_name
                      if region == 'us-east-1':
                          s3_client.create_bucket(Bucket=s3_bucket)
                      else:
                          s3_client.create_bucket(
                              Bucket=s3_bucket,
                              CreateBucketConfiguration={'LocationConstraint': region}
                          )
                  
                  print(f"Uploading Lambda zip to s3://{s3_bucket}/{s3_key}")
                  s3_client.upload_file(tmp_file_path, s3_bucket, s3_key)
                  
                  response_data = {
                      'LambdaCodeUrl': f's3://{s3_bucket}/{s3_key}',
                      'Message': 'Lambda connector code downloaded successfully'
                  }
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  return {"statusCode": 200}
              
              except Exception as e:
                  print(f"Error downloading Lambda zip: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
                  return {"statusCode": 500}

          def patch_connector_zip(zip_path):
              """Rewrite the connector's buggy pre_process_function to JSON-escape input."""
              buggy = '''return '{"parameters":{"question":"' + params.question + '","context":"' + params.context + '"}}';'''
              fixed = '''String bs = String.valueOf((char)92); String dq = String.valueOf((char)34); String nl = String.valueOf((char)10); String cr = String.valueOf((char)13); String tb = String.valueOf((char)9); String q = params.question.replace(bs, bs + bs).replace(dq, bs + dq).replace(nl, bs + 'n').replace(cr, bs + 'r').replace(tb, bs + 't'); String c = params.context.replace(bs, bs + bs).replace(dq, bs + dq).replace(nl, bs + 'n').replace(cr, bs + 'r').replace(tb, bs + 't'); return '{"parameters":{"question":"' + q + '","context":"' + c + '"}}';'''

              work_dir = "/tmp/connector-unzip"
              shutil.rmtree(work_dir, ignore_errors=True)
              os.makedirs(work_dir)
              with zipfile.ZipFile(zip_path, 'r') as zf:
                  # Validate no path traversal in archive members (CWE-22)
                  for name in zf.namelist():
                      if name.startswith('/') or '..' in name:
                          raise ValueError(f"Unsafe path in archive: {name}")
                  zf.extractall(work_dir)

              handler_path = os.path.join(work_dir, "lambda_function.py")
              if not os.path.exists(handler_path):
                  print("lambda_function.py not found in connector zip; skipping patch")
                  return
              with open(handler_path, 'r') as f:
                  content = f.read()
              if buggy not in content:
                  print("Expected pre_process_function not found; connector may already be patched")
                  return
              content = content.replace(buggy, fixed)
              with open(handler_path, 'w') as f:
                  f.write(content)
              print("Patched connector pre_process_function with JSON escaping")

              os.remove(zip_path)
              with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
                  for root, dirs, files in os.walk(work_dir):
                      for name in files:
                          full = os.path.join(root, name)
                          arcname = os.path.relpath(full, work_dir)
                          zf.write(full, arcname)
              print("Repacked connector zip with patched handler")
          
          def download_model(event, context):
              """Download model from CloudFront, repackage to flat SageMaker layout, upload to S3"""
              try:
                  # Download the model package from CloudFront CDN
                  model_url = "https://dguxzv9hali9y.cloudfront.net/semantic-highlighter-v1.0.0.gz"
                  target_bucket = event['ResourceProperties']['BucketName']
                  stack_id = event['ResourceProperties']['StackId']
                  target_key = f'{stack_id}/semantic-highlighter-model.tar.gz'

                  download_path = "/tmp/model-original.tar.gz"
                  extract_dir = "/tmp/model-extract"
                  repacked_path = "/tmp/semantic-highlighter-model.tar.gz"

                  print(f"Downloading model from {model_url}")
                  urllib.request.urlretrieve(model_url, download_path)

                  # Verify integrity of downloaded artifact
                  expected_hash = event['ResourceProperties'].get('ExpectedSha256', '')
                  if expected_hash:
                      with open(download_path, 'rb') as f:
                          actual_hash = hashlib.sha256(f.read()).hexdigest()
                      if actual_hash != expected_hash:
                          raise ValueError(f"Integrity check failed for model artifact. Expected {expected_hash}, got {actual_hash}")
                      print(f"  Integrity verified: SHA-256 = {actual_hash}")

                  # The CDN artifact nests everything under a single top-level directory
                  # (semantic-highlighter-v1.0.0/), which prevents SageMaker from finding
                  # code/inference.py and the model weights at the artifact root. Repackage
                  # flat so the archive root contains code/ and the model files directly.
                  shutil.rmtree(extract_dir, ignore_errors=True)
                  os.makedirs(extract_dir)
                  with tarfile.open(download_path, "r:gz") as tar:
                      # Validate no path traversal in archive members (CWE-22)
                      for member in tar.getmembers():
                          if member.name.startswith('/') or '..' in member.name:
                              raise ValueError(f"Unsafe path in archive: {member.name}")
                      tar.extractall(extract_dir)
                  # Remove original download to free disk space before repacking
                  os.remove(download_path)

                  entries = [d for d in os.listdir(extract_dir) if not d.startswith('.')]
                  if len(entries) == 1 and os.path.isdir(os.path.join(extract_dir, entries[0])):
                      src_root = os.path.join(extract_dir, entries[0])
                  else:
                      src_root = extract_dir
                  print(f"Repackaging from root: {src_root}")

                  if os.path.exists(repacked_path):
                      os.remove(repacked_path)
                  with tarfile.open(repacked_path, "w:gz") as tar:
                      for f in os.listdir(src_root):
                          if f.startswith('.'):
                              continue
                          tar.add(os.path.join(src_root, f), arcname=f)
                  # Remove extracted files to free disk space before upload
                  shutil.rmtree(extract_dir, ignore_errors=True)

                  # Create S3 bucket if it doesn't exist
                  s3_client = boto3.client('s3')
                  try:
                      s3_client.head_bucket(Bucket=target_bucket)
                      print(f"Bucket {target_bucket} already exists")
                  except botocore.exceptions.ClientError:
                      region = boto3.session.Session().region_name
                      if region == 'us-east-1':
                          s3_client.create_bucket(Bucket=target_bucket)
                      else:
                          s3_client.create_bucket(
                              Bucket=target_bucket,
                              CreateBucketConfiguration={'LocationConstraint': region}
                          )
                      print(f"Created bucket {target_bucket}")
                  
                  print(f"Uploading repackaged model to s3://{target_bucket}/{target_key}")
                  s3_client.upload_file(repacked_path, target_bucket, target_key)
                  
                  print(f"Successfully copied model to s3://{target_bucket}/{target_key}")
                  
                  response_data = {
                      'ModelDataUrl': f's3://{target_bucket}/{target_key}',
                      'Message': 'Full semantic highlighting model package copied successfully'
                  }
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
                  return {"statusCode": 200}
                  
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
                  return {"statusCode": 500}
      
      Handler: index.lambda_handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 1024
      EphemeralStorage:
        Size: 4096
      Environment:
        Variables:
          CLEANUP_AFTER_SUCCESS: "true"
      Role: !GetAtt HelperLambdaInvokeRole.Arn

  # Invoke Helper Lambda to copy model
  HelperLambdaInvokeModel:
    Type: Custom::InvokeLambda
    Condition: UseDefaultSageMakerEndpoint
    DeletionPolicy: Delete
    DependsOn: [ HelperLambdaFunction ]
    Properties:
      ServiceToken: !GetAtt HelperLambdaFunction.Arn
      BucketName: !Sub "opensearch-cfn-semantic-highlighting-${AWS::Region}-${AWS::AccountId}"
      StackId: !Select [ 4, !Split [ '-', !Select [ 2, !Split [ '/', !Ref AWS::StackId ] ] ] ]
      ExpectedSha256: !Ref ModelArtifactSha256

  # Download connector Lambda function from CloudFront
  HelperLambdaInvokeConnector:
    Type: Custom::InvokeLambda
    DeletionPolicy: Delete
    DependsOn: [HelperLambdaFunction, OpenSearchInvokeModelRole]
    Properties:
      ServiceToken: !GetAtt HelperLambdaFunction.Arn
      LambdaZipUrl: "https://d2wvpdb2jzk602.cloudfront.net/semantic-highlighter-connector-lambda-v1.zip"
      LambdaInvokeAOSRole: !Ref LambdaInvokeOpenSearchMLCommonsRoleName
      OpenSearchInvokeModelRole: !GetAtt OpenSearchInvokeModelRole.Arn
      S3Bucket: !Sub "opensearch-cfn-semantic-highlighting-${AWS::Region}-${AWS::AccountId}"
      S3Key: !Sub "${AWS::StackName}/semantic-highlighter-connector-lambda.zip"
      ExpectedSha256: !Ref ConnectorLambdaSha256
      CleanupS3Bucket: false

  # SageMaker Model
  Model:
    Type: "AWS::SageMaker::Model"
    Condition: UseDefaultSageMakerEndpoint
    DependsOn: [ HelperLambdaInvokeModel ]
    Properties:
      ModelName: !Join [ "-", [ !Ref ModelName, !Select [ 4, !Split [ '-', !Select [ 2, !Split [ '/', !Ref AWS::StackId ] ] ] ] ] ]
      PrimaryContainer:
        Image: !FindInMap [RegionMap, !Ref "AWS::Region", DefaultImageURLGPU]
        ModelDataUrl: !GetAtt HelperLambdaInvokeModel.ModelDataUrl
        Environment:
          SAGEMAKER_PROGRAM: inference.py
          SAGEMAKER_REQUIREMENTS: requirements.txt
      ExecutionRoleArn: !GetAtt SageMakerRole.Arn

  # SageMaker Endpoint Configuration
  EndpointConfig:
    Type: "AWS::SageMaker::EndpointConfig"
    Condition: UseDefaultSageMakerEndpoint
    Properties:
      EndpointConfigName: !Join [ "-", [ !Ref ModelName, "EndpointConfig", !Select [ 4, !Split [ '-', !Select [ 2, !Split [ '/', !Ref AWS::StackId ] ] ] ] ] ]
      ProductionVariants:
        - InitialInstanceCount: !Ref InitialInstanceCount
          InitialVariantWeight: 1.0
          InstanceType: !Ref InstanceType
          ModelName: !GetAtt Model.ModelName
          VariantName: !GetAtt Model.ModelName

  # SageMaker Endpoint
  Endpoint:
    Type: "AWS::SageMaker::Endpoint"
    Condition: UseDefaultSageMakerEndpoint
    Properties:
      EndpointConfigName: !GetAtt EndpointConfig.EndpointConfigName

  # ========================================
  # OPENSEARCH INTEGRATION RESOURCES
  # ========================================

  # OpenSearch Invoke Model Role - for SageMaker access
  OpenSearchInvokeModelRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "role-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: es.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              Service: es.aws.internal
            Action: sts:AssumeRole
      Policies:
        - PolicyName: OpenSearch-AccessSageMakerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpointAsync
                  - sagemaker:InvokeEndpoint
                Resource: !If
                  - UseDefaultSageMakerEndpoint
                  - !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/*'
                  - !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/${SageMakerEndpoint}'

  # Connector Lambda Function for OpenSearch Integration
  ConnectorLambdaFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Delete
    DependsOn: [HelperLambdaInvokeConnector]
    Properties:
      FunctionName: !Join ['-', ["SemanticHighlighterConnector", !Select [4, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId]]]]]]
      Code:
        S3Bucket: !Sub "opensearch-cfn-semantic-highlighting-${AWS::Region}-${AWS::AccountId}"
        S3Key: !Sub "${AWS::StackName}/semantic-highlighter-connector-lambda.zip"
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 1024
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/${LambdaInvokeOpenSearchMLCommonsRoleName}"
      Environment:
        Variables:
          SAGEMAKER_ENDPOINT: !If
            - UseDefaultSageMakerEndpoint
            - !GetAtt Endpoint.EndpointName
            - !Ref SageMakerEndpoint

  # Invoke Connector Lambda to integrate with OpenSearch
  InvokeConnectorLambda:
    Type: Custom::InvokeLambda
    DeletionPolicy: Delete
    DependsOn: [ConnectorLambdaFunction, OpenSearchInvokeModelRole]
    Properties:
      ServiceToken: !GetAtt ConnectorLambdaFunction.Arn
      AOSEndpoint: !Ref AmazonOpenSearchEndpoint
      AOSRoleArn: !GetAtt OpenSearchInvokeModelRole.Arn
      ModelName: !Ref ModelName
      SMEndpointName: !If
        - UseDefaultSageMakerEndpoint
        - !GetAtt Endpoint.EndpointName
        - !Ref SageMakerEndpoint
      DefaultProcessFunction: "true"

Outputs:
  # SageMaker Outputs
  SageMakerEndpointName:
    Description: Name of the SageMaker endpoint (created or provided)
    Value: !If
      - UseDefaultSageMakerEndpoint
      - !GetAtt Endpoint.EndpointName
      - !Ref SageMakerEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-SageMakerEndpointName"

  SageMakerModelName:
    Condition: UseDefaultSageMakerEndpoint
    Description: Name of the SageMaker model (only when created by this stack)
    Value: !GetAtt Model.ModelName
    Export:
      Name: !Sub "${AWS::StackName}-SageMakerModelName"

  ModelS3Location:
    Condition: UseDefaultSageMakerEndpoint
    Description: S3 location of the full semantic highlighting model (only when created by this stack)
    Value: !GetAtt HelperLambdaInvokeModel.ModelDataUrl
    Export:
      Name: !Sub "${AWS::StackName}-ModelS3Location"

  # OpenSearch Integration Outputs
  ConnectorLambdaFunctionName:
    Description: Name of the connector Lambda function
    Value: !Ref ConnectorLambdaFunction
    Export:
      Name: !Sub "${AWS::StackName}-ConnectorLambdaFunctionName"
  
  OpenSearchRoleArn:
    Description: ARN of the OpenSearch role for invoking SageMaker
    Value: !GetAtt OpenSearchInvokeModelRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-OpenSearchRoleArn"

  ConnectorId:
    Description: The connector ID created in OpenSearch ML Commons
    Value: !GetAtt InvokeConnectorLambda.connector_id
    Export:
      Name: !Sub "${AWS::StackName}-ConnectorId"
  
  ModelId:
    Description: The model ID created in OpenSearch ML Commons  
    Value: !GetAtt InvokeConnectorLambda.model_id
    Export:
      Name: !Sub "${AWS::StackName}-ModelId"
  
  ModelEndpoint:
    Description: The SageMaker endpoint URL used by OpenSearch
    Value: !GetAtt InvokeConnectorLambda.model_endpoint
    Export:
      Name: !Sub "${AWS::StackName}-ModelEndpoint"

  ModelGroupId:
    Description: The model group ID created in OpenSearch ML Commons
    Value: !GetAtt InvokeConnectorLambda.model_group_id
    Export:
      Name: !Sub "${AWS::StackName}-ModelGroupId"
