AWSTemplateFormatVersion: '2010-09-09'
Description: Complete CloudFormation Template for OpenSearch Semantic Highlighting - Creates SageMaker infrastructure AND integrates with OpenSearch ML Commons

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: "Amazon OpenSearch Configuration"
        Parameters:
          - AmazonOpenSearchEndpoint
          - LambdaInvokeOpenSearchMLCommonsRoleName
      -
        Label:
          default: "SageMaker Configuration"
        Parameters:
          - ModelName
          - InstanceType
          - InitialInstanceCount
    ParameterLabels:
      AmazonOpenSearchEndpoint:
        default: "Amazon OpenSearch Endpoint"
      LambdaInvokeOpenSearchMLCommonsRoleName:
        default: "Lambda Invoke OpenSearch ML Commons Role Name"
      ModelName:
        default: "Model Name"
      InstanceType:
        default: "Instance Type"
      InitialInstanceCount:
        default: "Initial Instance Count"

Parameters:
  ModelName:
    Type: String
    Default: "semantic-highlighter-model"
    Description: The name of the semantic highlighting model deployed. This will be used to construct the IAM role name as OpenSearch-RemoteInference-<ModelName>.
  InstanceType:
    Type: String
    Default: ml.g5.xlarge
    Description: The instance type for SageMaker endpoint (GPU recommended for better performance with full model).
    AllowedValues:
      - ml.g5.xlarge
      - ml.g5.2xlarge
      - ml.g5.4xlarge
      - ml.g4dn.xlarge
      - ml.g4dn.2xlarge
      - ml.g4dn.4xlarge
  InitialInstanceCount:
    Type: Number
    Default: 1
    Description: The initial number of instances for the SageMaker endpoint.
  AmazonOpenSearchEndpoint:
    Type: String
    Description: The Amazon OpenSearch endpoint URL.
    AllowedPattern: "https://.*"
    ConstraintDescription: "Must be a valid Amazon OpenSearch Service endpoint."
  LambdaInvokeOpenSearchMLCommonsRoleName:
    Type: String
    Default: "LambdaInvokeOpenSearchMLCommonsRole-os-demo-search"
    Description: The name of the existing IAM role that is used by Lambda to invoke Amazon OpenSearch domain. This role must already exist and be mapped to the OpenSearch domain's ml_full_access role.
    AllowedPattern: "[a-zA-Z0-9+=,.@_-]+"
  SageMakerEndpoint:
    Type: String
    Default: ""
    Description: "Optional: Name of an existing SageMaker endpoint to use. If not specified, a new endpoint will be created."
  ModelArtifactSha256:
    Type: String
    Default: "b7686bd24bb6a818478ce77723788fd7f84c10f71bf5d469d9c4dfc513b57d1c"
    Description: "SHA-256 checksum of the model artifact (semantic-highlighter-v1.0.0.gz). Update if the artifact changes."
  ConnectorLambdaSha256:
    Type: String
    Default: "57de7f9fbebed165fa61536c4894a1b3a8df4eddf9d167924933172ce7baeec6"
    Description: "SHA-256 checksum of the connector Lambda zip. Update if the artifact changes."

Conditions:
  UseDefaultSageMakerEndpoint: !Equals [!Ref SageMakerEndpoint, ""]
  IsGPUInstance: !Or
    - !Equals [!Ref InstanceType, "ml.g5.xlarge"]
    - !Equals [!Ref InstanceType, "ml.g5.2xlarge"]
    - !Equals [!Ref InstanceType, "ml.g5.4xlarge"]
    - !Equals [!Ref InstanceType, "ml.g5.8xlarge"]
    - !Equals [!Ref InstanceType, "ml.g5.12xlarge"]
    - !Equals [!Ref InstanceType, "ml.g4dn.xlarge"]
    - !Equals [!Ref InstanceType, "ml.g4dn.2xlarge"]
    - !Equals [!Ref InstanceType, "ml.g4dn.4xlarge"]

