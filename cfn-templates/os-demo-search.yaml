AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenSearch Semantic Search - Domain, OSI pipeline, Titan V2 embeddings via ML Commons Bedrock connector'

Parameters:
  StackPrefix:
    Type: String
    Default: os-demo
  SourceS3Bucket:
    Type: String
    Default: not-used
    Description: Optional S3 source bucket for OSI-based ingestion (production/scale path). The quick-start demo loads sample data directly and leaves this unused

Resources:

  # --- S3 bucket for contract data ---
  ContractsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${StackPrefix}-contracts-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # --- IAM roles ---

  DomainMasterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: opensearchservice.amazonaws.com}
            Action: sts:AssumeRole
          - Effect: Allow
            Principal: {AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'}
            Action: sts:AssumeRole

  LambdaInvokeOpenSearchMLCommonsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'LambdaInvokeOpenSearchMLCommonsRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OpenSearchAndIAM
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: es:ESHttp*
                Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${StackPrefix}-domain/*'
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt BedrockConnectorRole.Arn
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/role-${StackPrefix}-highlighting'

  # Role for OpenSearch ML Commons to invoke Bedrock
  BedrockConnectorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${StackPrefix}-bedrock-connector-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: opensearchservice.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'

  OSIPipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: osis-pipelines.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: OSIPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:GetBucketLocation, s3:ListBucket]
                Resource:
                  - !GetAtt ContractsBucket.Arn
                  - !Sub '${ContractsBucket.Arn}/*'
              - Effect: Allow
                Action: s3:ListAllMyBuckets
                Resource: 'arn:aws:s3:::*'
              - Effect: Allow
                Action: [es:DescribeDomain, 'es:ESHttp*']
                Resource:
                  - !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${StackPrefix}-domain'
                  - !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${StackPrefix}-domain/*'

  # --- OpenSearch domain ---

  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: !Sub '${StackPrefix}-domain'
      EngineVersion: OpenSearch_3.5
      ClusterConfig:
        InstanceType: r6g.large.search
        InstanceCount: 1
      EBSOptions:
        EBSEnabled: true
        VolumeSize: 20
        VolumeType: gp3
      EncryptionAtRestOptions:
        Enabled: true
      NodeToNodeEncryptionOptions:
        Enabled: true
      DomainEndpointOptions:
        EnforceHTTPS: true
        TLSSecurityPolicy: Policy-Min-TLS-1-2-2019-07
      AdvancedSecurityOptions:
        Enabled: true
        InternalUserDatabaseEnabled: false
        MasterUserOptions:
          MasterUserARN: !GetAtt DomainMasterRole.Arn
      AccessPolicies:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !GetAtt DomainMasterRole.Arn
                - !GetAtt OSIPipelineRole.Arn
                - !GetAtt LambdaInvokeOpenSearchMLCommonsRole.Arn
                - !GetAtt BedrockConnectorRole.Arn
                - !GetAtt QueryLambdaRole.Arn
            Action: 'es:*'
            Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${StackPrefix}-domain/*'

  # --- Query Lambda (test utility — not part of the production data path) ---

  QueryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QueryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !GetAtt DomainMasterRole.Arn
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'

  QueryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${StackPrefix}-query'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      MemorySize: 512
      Role: !GetAtt QueryLambdaRole.Arn
      Environment:
        Variables:
          DOMAIN: !GetAtt OpenSearchDomain.DomainEndpoint
          REGION: !Ref AWS::Region
          MASTER_ROLE_ARN: !GetAtt DomainMasterRole.Arn
      Code:
        ZipFile: |
          import json, os, boto3
          from botocore.auth import SigV4Auth
          from botocore.awsrequest import AWSRequest
          import urllib3
          http = urllib3.PoolManager(cert_reqs='CERT_REQUIRED')
          bedrock = boto3.client('bedrock-runtime')

          def signed_req(method, url, body=None):
              role = os.environ['MASTER_ROLE_ARN']
              c = boto3.client('sts').assume_role(RoleArn=role, RoleSessionName='qry')['Credentials']
              creds = boto3.Session(aws_access_key_id=c['AccessKeyId'],
                  aws_secret_access_key=c['SecretAccessKey'],
                  aws_session_token=c['SessionToken']).get_credentials()
              req = AWSRequest(method=method, url=url, data=body,
                  headers={'Content-Type': 'application/json'})
              SigV4Auth(creds, 'es', os.environ['REGION']).add_auth(req)
              return http.request(method, url, body=body, headers=dict(req.headers))

          def get_embedding(text):
              r = bedrock.invoke_model(modelId='amazon.titan-embed-text-v2:0',
                  contentType='application/json', accept='application/json',
                  body=json.dumps({'inputText': text}))
              return json.loads(r['body'].read())['embedding']

          def handler(event, context):
              domain = os.environ['DOMAIN']
              query_text = event.get('query', 'payment terms and late fees')
              search_type = event.get('type', 'neural')
              model_id = event.get('model_id', os.environ.get('MODEL_ID', ''))
              k = event.get('k', 3)

              if search_type == 'keyword':
                  highlight = {"fields": {"content": {}}}
                  body = {"query": {"match": {"content": query_text}},
                          "_source": ["content"], "size": k, "highlight": highlight}
              else:
                  highlight = {"fields": {"content": {}}}
                  if model_id:
                      highlight = {"fields": {"content": {"type": "semantic",
                          "highlight_query": {"match": {"content": query_text}}}},
                          "options": {"model_id": model_id}}
                  emb = get_embedding(query_text)
                  body = {"query": {"bool": {"should": [
                      {"knn": {"content_embedding": {"vector": emb, "k": k}}},
                      {"match": {"content": {"query": query_text, "boost": 0.3}}}
                  ]}}, "_source": ["content"], "size": k, "highlight": highlight}

              resp = signed_req('POST', f'https://{domain}/contracts/_search', json.dumps(body))
              return {'statusCode': resp.status,
                      'body': json.loads(resp.data.decode('utf-8'))}

  # --- OSI pipeline (sends raw data to OpenSearch; OpenSearch ingest pipeline handles embeddings) ---

  IngestionPipeline:
    Type: AWS::OSIS::Pipeline
    DependsOn: OpenSearchDomain
    Properties:
      PipelineName: !Sub '${StackPrefix}-ingest'
      MinUnits: 1
      MaxUnits: 2
      PipelineConfigurationBody: !Sub |
        version: "2"
        contract-pipeline:
          source:
            s3:
              compression: "none"
              codec:
                json:
              aws:
                region: "${AWS::Region}"
                sts_role_arn: "${OSIPipelineRole.Arn}"
              scan:
                buckets:
                  - bucket:
                      name: "${ContractsBucket}"
          sink:
            - opensearch:
                hosts:
                  - "https://${OpenSearchDomain.DomainEndpoint}"
                index: "contracts"
                aws:
                  sts_role_arn: "${OSIPipelineRole.Arn}"
                  region: "${AWS::Region}"

Outputs:
  DomainEndpoint:
    Description: 'OpenSearch endpoint URL (use as AmazonOpenSearchEndpoint for Stack 2)'
    Value: !Sub 'https://${OpenSearchDomain.DomainEndpoint}'
  DomainMasterRoleArn:
    Value: !GetAtt DomainMasterRole.Arn
  LambdaInvokeRoleName:
    Description: 'Use as LambdaInvokeOpenSearchMLCommonsRoleName for Stack 2'
    Value: !Sub 'LambdaInvokeOpenSearchMLCommonsRole-${AWS::StackName}'
  OSIPipelineRoleArn:
    Value: !GetAtt OSIPipelineRole.Arn
  MLCommonsRoleArn:
    Value: !GetAtt LambdaInvokeOpenSearchMLCommonsRole.Arn
  BedrockConnectorRoleArn:
    Value: !GetAtt BedrockConnectorRole.Arn
  ContractsBucketName:
    Value: !Ref ContractsBucket
  QueryFunctionName:
    Value: !Ref QueryFunction
  SourceS3Bucket:
    Value: !Ref SourceS3Bucket
